<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Clara County Cloud-Optimized Map</title>
    
    <!-- MapLibre GL JS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
    <!-- PMTiles protocol handler -->
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
    <!-- COG protocol handler -->
    <script src="https://unpkg.com/@geomatico/maplibre-cog-protocol@0.5.0/dist/index.js"></script>
    
    <script>
        // PMTiles and COG locations in the GitHub repository.
        const PMTILES_URL = 'https://raw.githubusercontent.com/mapninja/geo4lib_cloud_optimized/main/data/santa_clara_roads.pmtiles';
        const COG_URL = 'https://raw.githubusercontent.com/mapninja/geo4lib_cloud_optimized/main/data/santa_clara_1896_cog.tif';

        // Register the PMTiles protocol with MapLibre.
        // This is what makes pmtiles:// URLs work.
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol('pmtiles', protocol.tile);

        // Register the COG protocol with MapLibre so it can read COG URLs.
        maplibregl.addProtocol('cog', MaplibreCOGProtocol.cogProtocol);

        // Create one PMTiles instance and share it between the protocol handler
        // and the map source. This matches the official PMTiles example pattern.
        const p = new pmtiles.PMTiles(PMTILES_URL);
        protocol.add(p);

        // Read the PMTiles header first so we can center the map on the data.
        p.getHeader().then(async (header) => {
            const map = new maplibregl.Map({
                container: 'map',
                style: 'https://demotiles.maplibre.org/styles/osm-bright-gl-style/style.json',
                zoom: Math.max(header.maxZoom - 2, 10),
                center: [header.centerLon, header.centerLat],
                pitch: 0,
                bearing: 0
            });

            map.on('load', () => {
                // Add the historical COG as a raster source using the COG protocol.
                // MapLibre reads the GeoTIFF directly from the remote URL in tiles.
                map.addSource('historical-map', {
                    type: 'raster',
                    url: `cog://${COG_URL}`,
                    tileSize: 256
                });

                map.addLayer({
                    id: 'historical-layer',
                    type: 'raster',
                    source: 'historical-map',
                    paint: {
                        'raster-opacity': 0.6
                    }
                });

                // Add the roads PMTiles source.
                map.addSource('pmtiles-source', {
                    type: 'vector',
                    url: `pmtiles://${PMTILES_URL}`
                });

                // Add the roads layer from the PMTiles source.
                map.addLayer({
                    id: 'roads-layer',
                    type: 'line',
                    source: 'pmtiles-source',
                    'source-layer': 'roads',
                    layout: {
                        'line-join': 'round',
                        'line-cap': 'round'
                    },
                    paint: {
                        'line-color': '#FF0000',
                        'line-width': 2,
                        'line-opacity': 0.8
                    }
                });
            });
        });
    </script>
</body>
</html>
