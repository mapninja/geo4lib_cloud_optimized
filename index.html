<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Clara County Cloud-Optimized Map</title>
    
    <!-- MapLibre GL JS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <!-- PMTiles protocol handler -->
    <script src="https://unpkg.com/pmtiles@3.15.0/dist/pmtiles.js"></script>
    
    <script>
        // Initialize PMTiles protocol
        const pmtilesProtocol = new PMTiles(new URL('https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data/santa_clara_roads.pmtiles').href);
        
        // Create map
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-122.169, 37.427],
            zoom: 11,
            pitch: 0,
            bearing: 0
        });
        
        map.on('load', () => {
            // Add historical map COG as raster source
            map.addSource('historical-map', {
                type: 'raster',
                url: 'https://PLACEHOLDER_COG_URL/santa_clara_1896_cog.tif',
                tileSize: 256
            });
            
            // Add historical map layer
            map.addLayer({
                id: 'historical-layer',
                type: 'raster',
                source: 'historical-map',
                paint: {
                    'raster-opacity': 0.6
                }
            });
            
            // Add PMTiles vector source
            map.addSource('pmtiles-source', {
                type: 'vector',
                url: 'pmtiles://PLACEHOLDER_PMTILES_URL'
            });
            
            // Add roads layer
            map.addLayer({
                id: 'roads-layer',
                type: 'line',
                source: 'pmtiles-source',
                'source-layer': 'roads',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#FF0000',
                    'line-width': 2,
                    'line-opacity': 0.8
                }
            });
        });
    </script>
</body>
</html>
